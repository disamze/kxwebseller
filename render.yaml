services:
  - type: web
    name: kxmaterials-api
    env: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URI
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_RECEIVER_EMAIL
        value: disamaze@gmail.com
      - key: CONTACT_SENDER_EMAIL
        sync: false
      - key: ENABLE_SELF_PING
        value: "true"
      - key: SELF_PING_INTERVAL_MS
        value: "720000"
      - key: SELF_PING_URL
        value: http://127.0.0.1:5000/api/health

  - type: web
    name: kxmaterials-client
    env: node
    rootDir: client
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
